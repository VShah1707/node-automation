name: EMI Reminder

on:
  schedule:
    - cron: "0 * * * *"  # 7 AM IST
  workflow_dispatch:
permissions: 
    contents: write
jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: |
          echo "Script execution started"
          node index.js
          echo "Script execution completed"
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # ✅ THIS FIXES emi.json RESET ISSUE
      - name: Commit updated EMI
        run: |
          git config user.name "VShah1707"
          git config user.email "varshilshah2468@gmail.com"
          git add emi.json
          git commit -m "Update EMI number" || echo "No changes"
          # git pull origin main --rebase
          git push origin main
